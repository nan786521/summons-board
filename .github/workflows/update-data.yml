name: Weekly Data Update

on:
  schedule:
    # Every Sunday at 03:00 UTC (11:00 JST / 11:00 TST)
    - cron: '0 3 * * 0'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install urllib3

      - name: Scrape skill turns
        run: python scrape_turns.py
        continue-on-error: true

      - name: Scrape recommended souls
        run: python scrape_souls.py
        continue-on-error: true

      - name: Scrape obtain methods
        run: python scrape_obtain.py
        continue-on-error: true

      - name: Scrape potentials
        run: python scrape_potentials.py
        continue-on-error: true

      - name: Generate compressed JSON
        run: python gen_min_json.py

      - name: Check for changes
        id: check
        run: |
          git diff --quiet abilities.min.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add abilities.json abilities.min.json
          git commit -m "Auto-update: weekly data refresh

          Updated by GitHub Actions scheduled workflow"
          git push
